# pacman.conf for the DGX Spark live environment
# Includes DisableSandbox (kernel lacks CONFIG_SECURITY_LANDLOCK)
# and local repo for linux-dgx-spark kernel packages.

[options]
Architecture = aarch64
ParallelDownloads = 5
SigLevel = Required DatabaseOptional
DisableSandbox

# Custom local repository — linux-dgx-spark kernel packages
# Bundled into the live ISO by build.sh
[dgx-spark]
SigLevel = Optional TrustAll
Server = file:///var/lib/dgx-spark-repo

# Arch Linux ARM repositories
[core]
Include = /etc/pacman.d/mirrorlist

[extra]
Include = /etc/pacman.d/mirrorlist

[alarm]
Include = /etc/pacman.d/mirrorlist

[aur]
Include = /etc/pacman.d/mirrorlist
