# GRUB configuration for Arch Linux DGX Spark ISO
# Template variables (%INSTALL_DIR%, %ARCH%, %ARCHISO_UUID%) are substituted by mkarchiso.

insmod part_gpt
insmod part_msdos
insmod fat
insmod iso9660
insmod loopback
insmod linux
insmod normal
insmod search
insmod test

# Enable serial console (DGX Spark may use serial for headless operation)
insmod serial
insmod usbserial_common
insmod usbserial_ftdi
insmod usbserial_pl2303
insmod usbserial_usbdebug
if serial --unit=0 --speed=921600; then
    terminal_input --append serial
    terminal_output --append serial
fi

# Use graphics-mode output
if loadfont "${prefix}/fonts/unicode.pf2" ; then
    insmod all_video
    set gfxmode="auto"
    terminal_input console
    terminal_output console
fi

# Platform identifier
if [ "${grub_platform}" == 'efi' ]; then
    archiso_platform='UEFI'
else
    archiso_platform="${grub_cpu}-${grub_platform}"
fi

default=dgx-spark
timeout=5
timeout_style=menu

menuentry "Arch Linux DGX Spark (%ARCH%, ${archiso_platform})" --class arch --class gnu-linux --class gnu --class os --id 'dgx-spark' {
    set gfxpayload=keep
    linux /%INSTALL_DIR%/boot/%ARCH%/vmlinuz-linux-dgx-spark archisobasedir=%INSTALL_DIR% archisosearchuuid=%ARCHISO_UUID% console=ttyS0,921600 console=tty0 earlycon=uart,mmio32,0x16A00000 nouveau.modeset=0 sbsa_gwdt.action=1 pci=pcie_bus_safe
    initrd /%INSTALL_DIR%/boot/%ARCH%/initramfs-linux-dgx-spark.img
}

menuentry "Arch Linux DGX Spark (serial console)" --class arch --class gnu-linux --class gnu --class os --id 'dgx-spark-serial' {
    linux /%INSTALL_DIR%/boot/%ARCH%/vmlinuz-linux-dgx-spark archisobasedir=%INSTALL_DIR% archisosearchuuid=%ARCHISO_UUID% console=tty0 console=ttyS0,921600 earlycon=uart,mmio32,0x16A00000 nouveau.modeset=0 sbsa_gwdt.action=1 pci=pcie_bus_safe
    initrd /%INSTALL_DIR%/boot/%ARCH%/initramfs-linux-dgx-spark.img
}

menuentry "Arch Linux DGX Spark (copy to RAM)" --class arch --class gnu-linux --class gnu --class os --id 'dgx-spark-ram' {
    set gfxpayload=keep
    linux /%INSTALL_DIR%/boot/%ARCH%/vmlinuz-linux-dgx-spark archisobasedir=%INSTALL_DIR% archisosearchuuid=%ARCHISO_UUID% copytoram console=ttyS0,921600 console=tty0 earlycon=uart,mmio32,0x16A00000 nouveau.modeset=0 sbsa_gwdt.action=1 pci=pcie_bus_safe
    initrd /%INSTALL_DIR%/boot/%ARCH%/initramfs-linux-dgx-spark.img
}

if [ "${grub_platform}" == 'efi' ]; then
    if [ "${grub_cpu}" == 'arm64' -a -f '/shellaa64.efi' ]; then
        menuentry 'UEFI Shell' --class efi {
            chainloader /shellaa64.efi
        }
    fi

    menuentry 'UEFI Firmware Settings' --id 'uefi-firmware' {
        fwsetup
    }
fi

menuentry 'System shutdown' --class shutdown --class poweroff {
    echo 'System shutting down...'
    halt
}

menuentry 'System restart' --class reboot --class restart {
    echo 'System rebooting...'
    reboot
}
