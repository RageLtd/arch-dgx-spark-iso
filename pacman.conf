# pacman.conf for arch-dgx-spark-iso build
# This config is used by mkarchiso when creating the live environment.

[options]
Architecture = aarch64
ParallelDownloads = 5
SigLevel = Required DatabaseOptional
# Sandbox disabled — build runs inside a Docker container without kernel caps
DisableSandbox

# Custom local repository — linux-dgx-spark kernel packages
# Must be listed BEFORE official repos to take priority.
[dgx-spark]
SigLevel = Optional TrustAll
Server = file:///build/pkgs

# Arch Linux ARM repositories
[core]
Include = /etc/pacman.d/mirrorlist

[extra]
Include = /etc/pacman.d/mirrorlist

[alarm]
Include = /etc/pacman.d/mirrorlist

[aur]
Include = /etc/pacman.d/mirrorlist
